<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0A0E27">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tracker">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" href="icon-192.png">
  <title>Quick Macros</title>
  <style>
    :root {
      --pink:    #FF1493;
      --cyan:    #00E5FF;
      --purple:  #B000FF;
      --navy:    #0A0E27;
      --surface: #1A1E3A;
      --surface2:#222748;
      --orange:  #FF6B35;
      --green:   #39FF14;
      --hairline:  rgba(255,255,255,0.08);
      --hairline2: rgba(255,255,255,0.14);
      --g-neon: linear-gradient(90deg, var(--pink), var(--purple));
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: var(--navy);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }
    body {
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
    }
    button, input { font-family: inherit; }
    button { cursor: pointer; border: none; background: none; color: inherit; }

    .app {
      min-height: 100vh;
      padding: 18px 18px calc(20px + var(--safe-bottom));
      display: flex; flex-direction: column;
      max-width: 520px; margin: 0 auto;
    }

    /* Header */
    .header { margin-bottom: 18px; }
    .title { font-size: 30px; font-weight: 800; letter-spacing: -0.5px; }
    .date {
      font-size: 12px; font-weight: 700; letter-spacing: 2px; color: var(--cyan);
      text-shadow: 0 0 8px rgba(0,229,255,0.6);
      margin-top: 4px; text-transform: uppercase;
    }

    /* Totals */
    .totals {
      background: linear-gradient(135deg, var(--surface), var(--surface2));
      border: 0.5px solid var(--hairline2);
      border-radius: 22px;
      padding: 18px 16px;
      margin-bottom: 16px;
      box-shadow: 0 0 28px rgba(255,20,147,0.15);
    }
    .totals .cal-big {
      text-align: center;
      font-size: 56px; font-weight: 800; letter-spacing: -1.5px;
      font-family: ui-monospace, "SF Mono", monospace;
      font-variant-numeric: tabular-nums;
      color: white;
      text-shadow: 0 0 20px rgba(255,20,147,0.6);
      line-height: 1;
    }
    .totals .cal-label {
      text-align: center;
      font-size: 11px; font-weight: 700; letter-spacing: 3px;
      color: var(--pink); text-transform: uppercase;
      text-shadow: 0 0 6px rgba(255,20,147,0.5);
      margin-top: 6px;
    }
    .macros-row {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 8px; margin-top: 18px;
    }
    .macro {
      background: rgba(0,0,0,0.25);
      border: 0.5px solid var(--hairline);
      border-radius: 14px;
      padding: 10px 8px;
      text-align: center;
    }
    .macro .v {
      font-size: 22px; font-weight: 700;
      font-family: ui-monospace, "SF Mono", monospace;
      font-variant-numeric: tabular-nums;
    }
    .macro .l {
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; margin-top: 2px;
    }
    .macro.p .v { color: var(--cyan); text-shadow: 0 0 6px rgba(0,229,255,0.5); }
    .macro.p .l { color: var(--cyan); }
    .macro.c .v { color: var(--orange); text-shadow: 0 0 6px rgba(255,107,53,0.5); }
    .macro.c .l { color: var(--orange); }
    .macro.f .v { color: var(--purple); text-shadow: 0 0 6px rgba(176,0,255,0.5); }
    .macro.f .l { color: var(--purple); }

    /* Input card */
    .input-card {
      background: var(--surface);
      border: 0.5px solid var(--hairline2);
      border-radius: 22px;
      padding: 14px;
      margin-bottom: 16px;
    }
    .input-card .sec {
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      color: var(--cyan); text-transform: uppercase;
      text-shadow: 0 0 6px rgba(0,229,255,0.5);
      margin-bottom: 10px;
    }
    .fields {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .field {
      background: rgba(0,0,0,0.4);
      border: 0.5px solid var(--hairline2);
      border-radius: 12px;
      padding: 8px 12px;
      display: flex; flex-direction: column;
      transition: border-color .15s, box-shadow .15s;
    }
    .field:focus-within {
      border-color: var(--cyan);
      box-shadow: 0 0 0 1px var(--cyan), 0 0 10px rgba(0,229,255,0.4);
    }
    .field .label {
      font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
      color: rgba(255,255,255,0.55); text-transform: uppercase;
    }
    .field input {
      background: transparent; border: none; outline: none; padding: 4px 0 0;
      color: white; font-size: 22px; font-weight: 600;
      font-family: ui-monospace, "SF Mono", monospace;
      font-variant-numeric: tabular-nums;
      width: 100%; -webkit-appearance: none;
    }
    .field input::-webkit-inner-spin-button,
    .field input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .field.k input { color: var(--pink); }
    .field.p input { color: var(--cyan); }
    .field.c input { color: var(--orange); }
    .field.f input { color: var(--purple); }

    .log-btn {
      width: 100%; height: 52px; border-radius: 26px;
      background: var(--g-neon); color: white;
      font-size: 17px; font-weight: 800; letter-spacing: 0.5px;
      margin-top: 12px;
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow: 0 0 18px rgba(255,20,147,0.55), 0 6px 24px rgba(255,20,147,0.3);
      transition: transform .12s, opacity .15s;
    }
    .log-btn:active { transform: scale(0.98); }
    .log-btn:disabled { opacity: 0.4; box-shadow: none; }

    /* Entries list */
    .entries {
      background: var(--surface);
      border: 0.5px solid var(--hairline2);
      border-radius: 22px;
      overflow: hidden;
    }
    .entries .sec {
      padding: 14px 16px 10px;
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      color: var(--purple); text-transform: uppercase;
      text-shadow: 0 0 6px rgba(176,0,255,0.5);
      display: flex; align-items: baseline; justify-content: space-between;
    }
    .entries .sec .count {
      font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 0;
      font-family: ui-monospace, monospace;
    }
    .entry {
      display: flex; align-items: center; padding: 12px 16px;
      border-top: 0.5px solid var(--hairline);
    }
    .entry:active { background: rgba(255,255,255,0.04); }
    .entry .time {
      font-size: 11px; color: rgba(255,255,255,0.45);
      width: 56px; font-family: ui-monospace, monospace;
    }
    .entry .vals {
      flex: 1; display: flex; gap: 10px; flex-wrap: wrap;
      font-family: ui-monospace, monospace;
      font-size: 13px;
    }
    .entry .vals .kcal { color: white; font-weight: 700; }
    .entry .vals .px { color: var(--cyan); }
    .entry .vals .cx { color: var(--orange); }
    .entry .vals .fx { color: var(--purple); }
    .entry .del {
      width: 30px; height: 30px; border-radius: 50%;
      color: rgba(255,255,255,0.3); font-size: 18px;
      display: flex; align-items: center; justify-content: center;
    }
    .entry .del:active { color: var(--pink); background: rgba(255,20,147,0.15); }
    .empty {
      padding: 24px; text-align: center;
      font-size: 13px; color: rgba(255,255,255,0.4);
    }

    /* Footer */
    .footer {
      margin-top: 14px;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; color: rgba(255,255,255,0.35);
    }
    .footer .link {
      color: rgba(255,255,255,0.55);
      padding: 6px 10px; border-radius: 10px;
    }
    .footer .link:active { background: rgba(255,255,255,0.06); }

    /* Goals modal */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn .2s;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      width: calc(100% - 40px); max-width: 360px;
      background: var(--surface2);
      border: 0.5px solid var(--hairline2);
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .modal h2 { margin: 0 0 14px; font-size: 19px; font-weight: 700; }
    .modal .row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0;
    }
    .modal .row label { flex: 1; font-size: 14px; }
    .modal .row input {
      width: 96px; height: 40px; border-radius: 10px;
      background: rgba(0,0,0,0.4); border: 0.5px solid var(--hairline2);
      color: white; padding: 0 10px; font-size: 16px;
      font-family: ui-monospace, monospace;
      outline: none; -webkit-appearance: none;
    }
    .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
    .modal-actions button {
      flex: 1; height: 44px; border-radius: 22px;
      font-size: 15px; font-weight: 600;
    }
    .modal-actions .cancel { background: rgba(255,255,255,0.08); }
    .modal-actions .confirm {
      background: var(--g-neon);
      box-shadow: 0 0 14px rgba(255,20,147,0.5);
    }

    /* Toast */
    .toast {
      position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%);
      padding: 10px 16px;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      border: 0.5px solid var(--hairline2);
      border-radius: 14px;
      color: white; font-size: 13px; font-weight: 600;
      z-index: 200;
      box-shadow: 0 0 14px rgba(255,20,147,0.4);
      animation: toastIn .25s, toastOut .25s 1.6s forwards;
    }
    @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }
    @keyframes toastOut { to { opacity: 0; transform: translate(-50%, 20px); } }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="title">Today</div>
      <div class="date" id="date"></div>
    </div>

    <div class="totals">
      <div class="cal-big" id="t-cal">0</div>
      <div class="cal-label">kcal</div>
      <div class="macros-row">
        <div class="macro p"><div class="v" id="t-p">0</div><div class="l">Protein</div></div>
        <div class="macro c"><div class="v" id="t-c">0</div><div class="l">Carbs</div></div>
        <div class="macro f"><div class="v" id="t-f">0</div><div class="l">Fat</div></div>
      </div>
      <div id="goal-line" style="margin-top: 14px; text-align: center; font-size: 11px; color: rgba(255,255,255,0.5); font-family: ui-monospace, monospace;"></div>
    </div>

    <div class="input-card">
      <div class="sec">● Add entry</div>
      <div class="fields">
        <label class="field k">
          <span class="label">Calories</span>
          <input id="i-cal" type="number" inputmode="decimal" placeholder="0" enterkeyhint="next"/>
        </label>
        <label class="field p">
          <span class="label">Protein (g)</span>
          <input id="i-p" type="number" inputmode="decimal" placeholder="0" enterkeyhint="next"/>
        </label>
        <label class="field c">
          <span class="label">Carbs (g)</span>
          <input id="i-c" type="number" inputmode="decimal" placeholder="0" enterkeyhint="next"/>
        </label>
        <label class="field f">
          <span class="label">Fat (g)</span>
          <input id="i-f" type="number" inputmode="decimal" placeholder="0" enterkeyhint="done"/>
        </label>
      </div>
      <button class="log-btn" id="log-btn" disabled>Log entry</button>
    </div>

    <div class="entries">
      <div class="sec"><span>● Today's entries</span><span class="count" id="entry-count"></span></div>
      <div id="entries-list"></div>
    </div>

    <div class="footer">
      <button class="link" id="goals-btn">Edit goals</button>
      <button class="link" id="reset-btn">Clear day</button>
    </div>
  </div>

  <script>
    'use strict';

    const STORAGE = 'qm-pwa-v1';
    const dayKey = (d = new Date()) => d.toISOString().slice(0, 10);

    function loadState() {
      try {
        const raw = JSON.parse(localStorage.getItem(STORAGE) || '{}');
        return {
          entries: Array.isArray(raw.entries) ? raw.entries : [],
          goals: raw.goals || { cal: 2400, p: 170, c: 240, f: 80 },
        };
      } catch {
        return { entries: [], goals: { cal: 2400, p: 170, c: 240, f: 80 } };
      }
    }
    function save() { localStorage.setItem(STORAGE, JSON.stringify(state)); }

    let state = loadState();

    function vibrate(p = 10) {
      try { navigator.vibrate && navigator.vibrate(p); } catch {}
    }

    function showToast(text) {
      const el = document.createElement('div');
      el.className = 'toast';
      el.textContent = text;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2000);
    }

    function todayEntries() {
      const k = dayKey();
      return state.entries.filter(e => e.day === k).sort((a, b) => b.ts - a.ts);
    }

    function totalsForToday() {
      let cal = 0, p = 0, c = 0, f = 0;
      for (const e of todayEntries()) {
        cal += e.cal || 0; p += e.p || 0; c += e.c || 0; f += e.f || 0;
      }
      return { cal, p, c, f };
    }

    function fmt(n) {
      if (n == null || isNaN(n)) return '0';
      // Show ints as ints, decimals to 1 place
      return (Math.round(n * 10) / 10).toString();
    }

    function fmtTime(ts) {
      const d = new Date(ts);
      return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    }

    function dateLabel() {
      const d = new Date();
      const w = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
      return `● ${w.toUpperCase()}`;
    }

    function render() {
      document.getElementById('date').textContent = dateLabel();

      const t = totalsForToday();
      document.getElementById('t-cal').textContent = Math.round(t.cal).toLocaleString();
      document.getElementById('t-p').textContent = fmt(t.p);
      document.getElementById('t-c').textContent = fmt(t.c);
      document.getElementById('t-f').textContent = fmt(t.f);

      const g = state.goals;
      const remaining = g.cal - t.cal;
      const goalLine = document.getElementById('goal-line');
      if (remaining > 0) goalLine.textContent = `${remaining.toLocaleString()} kcal to goal (${g.cal.toLocaleString()})`;
      else if (remaining === 0) goalLine.textContent = `at goal (${g.cal.toLocaleString()})`;
      else goalLine.textContent = `${Math.abs(remaining).toLocaleString()} over goal (${g.cal.toLocaleString()})`;

      const entries = todayEntries();
      const list = document.getElementById('entries-list');
      list.innerHTML = '';
      document.getElementById('entry-count').textContent = entries.length
        ? `${entries.length} ${entries.length === 1 ? 'entry' : 'entries'}` : '';

      if (entries.length === 0) {
        list.innerHTML = '<div class="empty">No entries yet. Log your first above.</div>';
      } else {
        for (const e of entries) {
          const row = document.createElement('div');
          row.className = 'entry';
          row.innerHTML = `
            <div class="time">${fmtTime(e.ts)}</div>
            <div class="vals">
              <span class="kcal">${Math.round(e.cal || 0)} kcal</span>
              ${e.p ? `<span class="px">${fmt(e.p)}p</span>` : ''}
              ${e.c ? `<span class="cx">${fmt(e.c)}c</span>` : ''}
              ${e.f ? `<span class="fx">${fmt(e.f)}f</span>` : ''}
            </div>
            <button class="del" data-id="${e.id}" aria-label="Delete">×</button>
          `;
          list.appendChild(row);
        }
        list.querySelectorAll('.del').forEach(btn => {
          btn.addEventListener('click', () => {
            const id = btn.dataset.id;
            state.entries = state.entries.filter(e => e.id !== id);
            save(); render(); vibrate(10);
          });
        });
      }
    }

    function parseField(id) {
      const el = document.getElementById(id);
      const v = parseFloat(el.value);
      return isNaN(v) ? 0 : v;
    }

    function clearFields() {
      ['i-cal', 'i-p', 'i-c', 'i-f'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('log-btn').disabled = true;
      document.getElementById('i-cal').focus();
    }

    function updateLogBtn() {
      const any = parseField('i-cal') > 0 || parseField('i-p') > 0 || parseField('i-c') > 0 || parseField('i-f') > 0;
      document.getElementById('log-btn').disabled = !any;
    }

    function logEntry() {
      const cal = parseField('i-cal');
      const p = parseField('i-p');
      const c = parseField('i-c');
      const f = parseField('i-f');
      if (cal === 0 && p === 0 && c === 0 && f === 0) return;

      // Auto-compute calories from macros if cal=0 but macros present (4/4/9)
      const computedCal = cal > 0 ? cal : Math.round(p * 4 + c * 4 + f * 9);

      const entry = {
        id: Math.random().toString(36).slice(2) + Date.now().toString(36),
        day: dayKey(),
        ts: Date.now(),
        cal: computedCal, p, c, f,
      };
      state.entries.push(entry);
      save();
      clearFields();
      render();
      vibrate([8, 30, 12]);
      // Blur to dismiss keyboard
      document.activeElement && document.activeElement.blur && document.activeElement.blur();
      showToast(`Logged ${computedCal} kcal`);
    }

    // Wire up inputs
    ['i-cal', 'i-p', 'i-c', 'i-f'].forEach(id => {
      const el = document.getElementById(id);
      el.addEventListener('input', updateLogBtn);
    });

    // Enter on last field logs
    document.getElementById('i-f').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); logEntry(); }
    });

    document.getElementById('log-btn').addEventListener('click', logEntry);

    document.getElementById('reset-btn').addEventListener('click', () => {
      const count = todayEntries().length;
      if (count === 0) { showToast('Nothing to clear'); return; }
      if (confirm(`Clear ${count} ${count === 1 ? 'entry' : 'entries'} from today?`)) {
        const k = dayKey();
        state.entries = state.entries.filter(e => e.day !== k);
        save(); render(); vibrate(20);
        showToast('Day cleared');
      }
    });

    // Goals modal
    document.getElementById('goals-btn').addEventListener('click', () => {
      const overlay = document.createElement('div');
      overlay.className = 'modal-backdrop';
      overlay.innerHTML = `
        <div class="modal">
          <h2>Daily goals</h2>
          <div class="row"><label>Calories</label><input id="g-cal" type="number" inputmode="decimal" value="${state.goals.cal}"></div>
          <div class="row"><label>Protein (g)</label><input id="g-p" type="number" inputmode="decimal" value="${state.goals.p}"></div>
          <div class="row"><label>Carbs (g)</label><input id="g-c" type="number" inputmode="decimal" value="${state.goals.c}"></div>
          <div class="row"><label>Fat (g)</label><input id="g-f" type="number" inputmode="decimal" value="${state.goals.f}"></div>
          <div class="modal-actions">
            <button class="cancel">Cancel</button>
            <button class="confirm">Save</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);

      const close = () => overlay.remove();
      overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
      overlay.querySelector('.cancel').addEventListener('click', close);
      overlay.querySelector('.confirm').addEventListener('click', () => {
        state.goals = {
          cal: parseFloat(overlay.querySelector('#g-cal').value) || 2400,
          p:   parseFloat(overlay.querySelector('#g-p').value) || 0,
          c:   parseFloat(overlay.querySelector('#g-c').value) || 0,
          f:   parseFloat(overlay.querySelector('#g-f').value) || 0,
        };
        save(); render(); close(); vibrate(10);
        showToast('Goals saved');
      });
    });

    render();
    clearFields();

    // Auto re-render at midnight so "Today" rolls over
    function scheduleMidnight() {
      const now = new Date();
      const next = new Date(now);
      next.setHours(24, 0, 5, 0); // 5s after midnight
      const ms = next - now;
      setTimeout(() => { render(); scheduleMidnight(); }, ms);
    }
    scheduleMidnight();

    // Service worker for installability
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
