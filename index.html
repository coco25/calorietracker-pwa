        ${editing === 'target' && html`<${SimpleEditModal} title="Target weight" placeholder=${`weight (${u.weightUnit})`} initial=${u.targetWeight ?? ''} numeric
          onCancel=${() => setEditing(null)}
          onSave=${(v) => { const n = parseFloat(v); updateUser({ targetWeight: isNaN(n) ? null : n }); setEditing(null); }}/>`}

        ${editing === 'weight-log' && html`<${WeightLogModal} onClose=${() => setEditing(null)}/>`}

    function SimpleEditModal({ title, placeholder, initial, numeric, onCancel, onSave }) {

    function WeightLogModal({ onClose }) {
      const s = useStore();

                  ${entries.map(e => html`<div class="meal-row" key=${e.id}>
                    <div class="name" style="flex:1;">${new Date(e.date).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</div>
                    <div class="cal num">${e.weight.toFixed(1)} ${s.user.weightUnit}</div>
                    <button style="background:transparent;border:none;color:var(--text-dim);margin-left:8px;" onClick=${() => deleteWeight(e.id)}><${Icon} name="trash" size=16/></button>

    /* ─────────────────────────────────────────────────────────────────
       ADD FOOD SHEET
       ───────────────────────────────────────────────────────────────── */
    function AddFoodSheet({ mealType, onClose, onOpenFood, onQuickAdd, onOpenScanner }) {
      const s = useStore();
      const [query, setQuery] = useState('');
      const [tab, setTab] = useState('all');
      const [usdaResults, setUsdaResults] = useState([]);
      const [loading, setLoading] = useState(false);
      const debounceRef = useRef(null);

      useEffect(() => {
        document.body.classList.add('no-scroll');
        return () => document.body.classList.remove('no-scroll');
      }, []);

      useEffect(() => {
        clearTimeout(debounceRef.current);
        if (!query.trim()) { setUsdaResults([]); setLoading(false); return; }
        debounceRef.current = setTimeout(async () => {
          setLoading(true);
          setUsdaResults(await searchUSDA(query, ['Branded','Foundation','SR Legacy'], 20));
          setLoading(false);
        }, 350);
      }, [query]);

      const logIndex = useMemo(() => buildLogIndex(s.meals), [s.meals]);
      const curated = searchCurated(query).map(curatedToFood);
      const recent = recentLogged(logIndex, 8).filter(it => !query.trim() || it.name.toLowerCase().includes(query.toLowerCase()));
      const top = topLogged(logIndex, 8);

      const sections = [];
      if (query.trim()) {
        if (curated.length) sections.push({ title: '★ Curated', color: 'var(--pink)', foods: curated });
        if (recent.length) sections.push({ title: '↻ Your History', color: 'var(--cyan)', foods: recent.map(r => logEntryToFood(r.sample)) });
        const branded = usdaResults.filter(f => f.dataType === 'Branded');
        const foundation = usdaResults.filter(f => f.dataType !== 'Branded');
        if (branded.length) sections.push({ title: 'Branded', color: 'var(--purple)', foods: branded });
        if (foundation.length) sections.push({ title: 'USDA Foundation', color: 'var(--text-mid)', foods: foundation });
      }

      const meal = MEAL_BY_ID[mealType];

      return html`<div class="sheet-backdrop" onClick=${onClose}>
        <div class="sheet" onClick=${(e) => e.stopPropagation()}>
          <div class="drag-handle"></div>
          <div style="padding: 6px 20px 8px;">
            <span class="sec-label" style=${{ color: meal.color, textShadow: `0 0 6px ${meal.color}` }}>● ADD TO ${meal.name.toUpperCase()}</span>
            <div class="large-title" style="font-size: 26px; margin-top: 4px;">Find food</div>
          </div>

          <div style="padding: 6px 0;">
            <div class="search-bar">
              <${Icon} name="search" size=18 color="var(--cyan)"/>
              <input value=${query} onInput=${(e) => setQuery(e.target.value)}
                     placeholder="Search foods, brands, recipes…" type="search" enterkeyhint="search" autofocus/>
              ${query && html`<button class="date-pill" style="width:28px;height:28px;background:transparent;border:none;color:var(--text-low);" onClick=${() => setQuery('')}><${Icon} name="x" size=14/></button>`}
              <button class="barcode-btn" onClick=${onOpenScanner}><${Icon} name="barcode" size=18 color="var(--pink)"/></button>
            </div>
          </div>

          <div class="pill-tabs">
            ${[
              { id: 'all',    label: 'All' },
              { id: 'top',    label: 'Top' },
              { id: 'recent', label: 'Recent' },
            ].map(t => html`<button key=${t.id} class=${'pill-tab ' + (tab === t.id ? 'active' : '')} onClick=${() => setTab(t.id)}>${t.label}</button>`)}
          </div>

          <div style="flex:1; overflow-y:auto; padding-bottom: 20px;">
            ${tab === 'all' && !query.trim() && html`<${EmptyAllState} top=${top} onOpen=${onOpenFood}/>`}
            ${tab === 'all' && query.trim() && (sections.length > 0
              ? sections.map(sec => html`<${ResultsSection} key=${sec.title} title=${sec.title} color=${sec.color} foods=${sec.foods} onOpen=${onOpenFood}/>`)
              : (loading
                  ? html`<div style="text-align:center;padding:32px;color:var(--text-mid);">Searching…</div>`
                  : html`<div style="text-align:center;padding:32px;color:var(--text-mid);">No matches yet.</div>`))}
            ${tab === 'top' && html`<${EmptyAllState} top=${top} onOpen=${onOpenFood}/>`}
            ${tab === 'recent' && html`<div style="padding: 0 16px;">
              ${recent.length === 0
                ? html`<div style="text-align:center;padding:32px;color:var(--text-mid);">No recent foods yet.</div>`
                : html`<div class="glass glass-flush">${recent.map(r => {
                    const f = logEntryToFood(r.sample);
                    return html`<${ResultRow} key=${r.name} food=${f} isApproved=${r.approved} isRecent onClick=${() => onOpenFood(f)}/>`;
                  })}</div>`}
            </div>`}
          </div>
        </div>
      </div>`;
    }

    /* ─────────────────────────────────────────────────────────────────
       FOOD DETAIL SHEET
       ───────────────────────────────────────────────────────────────── */
    function FoodDetailSheet({ food, initialMeal, editing, onClose, onConfirm }) {
      const [qty, setQty] = useState(editing?.qty ?? 1);
      const [size, setSize] = useState(editing?.size ?? food.size ?? 100);
      const [unit, setUnit] = useState(editing?.unit ?? food.unit ?? 'g');
      const [meal, setMeal] = useState(editing?.mealType ?? initialMeal);
      const [approved, setApproved] = useState(editing?.isApproved ?? false);

      useEffect(() => {
        document.body.classList.add('no-scroll');
        return () => document.body.classList.remove('no-scroll');
      }, []);

      const m = scaledMacros(food, qty, size);
      const tot = m.p + m.c + m.f;
      const pPct = tot ? m.p / tot : 0.34;
      const cPct = tot ? m.c / tot : 0.33;
      const fPct = tot ? m.f / tot : 0.33;

      return html`<div class="sheet-backdrop" onClick=${onClose}>
        <div class="sheet" onClick=${(e) => e.stopPropagation()}>
          <div class="drag-handle"></div>
          <div style="flex:1; overflow-y:auto; padding-bottom: 100px;">
            <div style="padding: 0 16px 14px;">
              <div style="display: flex; align-items: center; gap: 8px;">
                ${food.brand && html`<span class="sec-label" style="color: var(--pink); text-shadow: 0 0 6px rgba(255,20,147,0.6);">${food.brand}</span>`}
                ${approved && html`<${Fragment}><${PinkSeal} size=14/><span style="font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--pink);">APPROVED</span></${Fragment}>`}
              </div>
              <div style="font-size: 26px; font-weight: 700; letter-spacing: -0.4px; margin-top: 8px;">${food.name}</div>
              ${food.serving && html`<div style="font-size: 13px; color: var(--text-mid); margin-top: 4px;">Default: ${food.serving}</div>`}
            </div>

            <div class="glass" style="margin: 0 16px 14px;">
              <span class="sec-label" style="color: var(--cyan); text-shadow: 0 0 6px rgba(0,229,255,0.6);">● SERVING</span>
              <div style="display: flex; gap: 8px; margin-top: 12px;">
                <div class="pill-field" style="flex: 1.4;">
                  <div class="lbl">Qty</div>
                  <input type="number" inputmode="decimal" value=${qty} onInput=${(e) => setQty(Math.max(0.1, parseFloat(e.target.value) || 0))}/>
                </div>
                <div class="pill-field">
                  <div class="lbl">Size</div>
                  <input type="number" inputmode="decimal" value=${size} onInput=${(e) => setSize(Math.max(0.1, parseFloat(e.target.value) || 0))}/>
                </div>
                <div class="pill-field" style="flex: 0.8;">
                  <div class="lbl">Unit</div>
                  <input value=${unit} onInput=${(e) => setUnit(e.target.value)}/>
                </div>
              </div>
              <div style="display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap;">
                ${[0.5, 1, 1.5, 2].map(q => html`<button key=${q} onClick=${() => setQty(q)} style=${{
                  height: '26px', padding: '0 10px', borderRadius: '13px',
                  background: qty === q ? 'color-mix(in srgb, var(--cyan) 25%, transparent)' : 'color-mix(in srgb, var(--cyan) 8%, transparent)',
                  border: '0.5px solid color-mix(in srgb, var(--cyan) 55%, transparent)',
                  color: 'var(--cyan)', fontWeight: 600, fontSize: '12px',
                  fontFamily: 'ui-monospace, monospace',
                }}>${q}×</button>`)}
              </div>
            </div>

            <div class="glass" style="margin: 0 16px 14px;">
              <div style="display: flex; gap: 14px; align-items: center;">
                <${MacroDonut} p=${pPct} c=${cPct} f=${fPct}/>
                <div style="flex:1;">
                  <div style="font-size: 36px; font-weight: 700; letter-spacing: -0.6px; line-height: 1; text-shadow: 0 0 14px rgba(255,20,147,0.5);" class="num">${m.cal}</div>
                  <div class="num" style="font-size: 11px; color: var(--text-low); margin-top: 4px; letter-spacing: 0.5px;">kcal · ${qty}× ${size}${unit}</div>
                  <div style="display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap;">
                    <${MacroDot} color="var(--cyan)" label="P" grams=${m.p}/>
                    <${MacroDot} color="var(--orange)" label="C" grams=${m.c}/>
                    <${MacroDot} color="var(--purple)" label="F" grams=${m.f}/>
                  </div>
                </div>
              </div>
            </div>

            <div style="margin: 0 16px 14px;">
              <button onClick=${() => setApproved(!approved)} style=${{
                width: '100%', height: '44px', borderRadius: '14px', padding: '0 14px',
                background: `color-mix(in srgb, var(--pink) ${approved ? 18 : 8}%, transparent)`,
                border: `0.5px solid color-mix(in srgb, var(--pink) 50%, transparent)`,
                display: 'flex', alignItems: 'center', gap: '8px',
                boxShadow: '0 0 12px rgba(255,20,147,0.3)',
                color: 'white', fontSize: '13px', fontWeight: 600,
              }}>
                <${PinkSeal} size=18/>
                <span>Approved</span>
                <span style="flex:1;"></span>
                <div style=${{
                  width: '44px', height: '26px', borderRadius: '13px',
                  background: approved ? 'var(--g-neon)' : 'rgba(255,255,255,0.12)',
                  position: 'relative', transition: 'background 0.2s',
                  boxShadow: approved ? '0 0 14px rgba(255,20,147,0.7)' : 'none',
                }}>
                  <div style=${{
                    position: 'absolute', top: '2px', left: approved ? '20px' : '2px',
                    width: '22px', height: '22px', borderRadius: '50%', background: 'white',
                    transition: 'left 0.2s',
                  }}></div>
                </div>
              </button>
            </div>

            <div style="display: flex; gap: 8px; margin: 0 16px 14px;">
              ${MEALS.map(M => html`<button key=${M.id} onClick=${() => { haptic('light'); setMeal(M.id); }} style=${{
                flex: 1, height: '40px', borderRadius: '12px', padding: '0 8px',
                background: meal === M.id ? `color-mix(in srgb, ${M.color} 22%, transparent)` : 'rgba(255,255,255,0.04)',
                border: `0.5px solid ${meal === M.id ? M.color : 'var(--hairline2)'}`,
                color: meal === M.id ? M.color : 'var(--text-mid)',
                fontWeight: 600, fontSize: '12px', letterSpacing: '0.4px',
                textShadow: meal === M.id ? `0 0 6px ${M.color}` : 'none',
                boxShadow: meal === M.id ? `inset 0 0 12px color-mix(in srgb, ${M.color} 30%, transparent), 0 0 12px color-mix(in srgb, ${M.color} 30%, transparent)` : 'none',
              }}>${M.name}</button>`)}
            </div>
          </div>

          <div style="position: absolute; left: 0; right: 0; bottom: 0; padding: 14px 16px calc(20px + var(--safe-bottom)); background: linear-gradient(0deg, var(--navy) 50%, transparent);">
            <button class="neon-cta" onClick=${() => onConfirm(food, meal, qty, size, unit, approved)}>
              <${Icon} name="check" size=18 color="white" stroke=2.5/>
              Log to ${MEAL_BY_ID[meal].name} · ${m.cal} kcal
            </button>
          </div>
        </div>
      </div>`;
    }

    function MacroDonut({ p, c, f, size = 90 }) {
      const stroke = 12, r = (size - stroke) / 2, C = 2 * Math.PI * r;
      const seg = (frac, color, offset) => html`<circle cx=${size/2} cy=${size/2} r=${r}
        fill="none" stroke=${color} stroke-width=${stroke}
        stroke-dasharray=${`${C * frac} ${C}`} stroke-dashoffset=${-C * offset}
        style=${{ filter: `drop-shadow(0 0 5px ${color})` }}/>`;
      return html`<svg width=${size} height=${size} style="transform: rotate(-90deg);">
        <circle cx=${size/2} cy=${size/2} r=${r} fill="none" stroke="rgba(255,255,255,0.05)" stroke-width=${stroke}/>
        ${seg(p, 'var(--cyan)', 0)}
        ${seg(c, 'var(--orange)', p)}
        ${seg(f, 'var(--purple)', p + c)}
      </svg>`;
    }

    function MacroDot({ color, label, grams }) {
      return html`<span style="display: inline-flex; align-items: center; gap: 5px;">
        <span style=${{ width: '8px', height: '8px', borderRadius: '50%', background: color, boxShadow: `0 0 4px ${color}` }}></span>
        <span style=${{ fontSize: '11px', fontWeight: 700, color, letterSpacing: '1px' }}>${label}</span>
        <span class="num" style="font-size: 12px; color: white; font-weight: 600;">${Math.round(grams)}g</span>
      </span>`;
    }

    /* ─────────────────────────────────────────────────────────────────
       BARCODE SCANNER (ZXing-js via CDN)
       ───────────────────────────────────────────────────────────────── */
    function BarcodeScanner({ onClose, onResult }) {
      const videoRef = useRef(null);
      const [error, setError] = useState(null);
      const [showManual, setShowManual] = useState(false);
      const [manual, setManual] = useState('');
      const controlsRef = useRef(null);

      useEffect(() => {
        let cancelled = false;
        let codeReader = null;

        async function start() {
          try {
            // Dynamically import ZXing only when scanner opens (lazy load)
            const ZXing = await import('https://esm.sh/@zxing/library@0.21.3');
            if (cancelled) return;
            const hints = new Map();
            hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
              ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8,
              ZXing.BarcodeFormat.UPC_A,  ZXing.BarcodeFormat.UPC_E,
              ZXing.BarcodeFormat.CODE_128, ZXing.BarcodeFormat.CODE_39,
            ]);
            codeReader = new ZXing.BrowserMultiFormatReader(hints);
            const devices = await codeReader.listVideoInputDevices();
            // Prefer back camera
            const back = devices.find(d => /back|rear|environment/i.test(d.label)) || devices[0];
            if (!back) throw new Error('No camera found');
            controlsRef.current = await codeReader.decodeFromVideoDevice(back.deviceId, videoRef.current, (result, err) => {
              if (cancelled) return;
              if (result) {
                const code = result.getText();
                haptic('success');
                cancelled = true;
                try { controlsRef.current?.stop?.(); } catch {}
                codeReader.reset?.();
                onResult(code);
              }
            });
          } catch (e) {
            console.error('scanner', e);
            setError(e.message || 'Camera unavailable');
          }
        }

        start();

        return () => {
          cancelled = true;
          try { controlsRef.current?.stop?.(); } catch {}
          try { codeReader?.reset?.(); } catch {}
          // Hard-stop stream
          const stream = videoRef.current?.srcObject;
          if (stream) stream.getTracks().forEach(t => t.stop());
        };
      }, []);

      return html`<div class="scanner">
        <video ref=${videoRef} playsinline autoplay muted></video>
        <div class="frame">
          <div class="corner tl"></div>
          <div class="corner tr"></div>
          <div class="corner bl"></div>
          <div class="corner br"></div>
          <div class="laser"></div>
        </div>
        <div class="scanner-controls">
          <button class="scanner-pill" style="color: var(--cyan);" onClick=${onClose}>
            <${Icon} name="chev_l" size=12 color="var(--cyan)"/> Cancel
          </button>
          <button class="scanner-pill" style="color: white;" onClick=${() => setShowManual(true)}>
            <span style="width:8px;height:8px;border-radius:50%;background:var(--pink);box-shadow:0 0 4px var(--pink);"></span>
            Type UPC
          </button>
        </div>
        <div class="scanner-caption">
          ${error
            ? html`<${Fragment}>
                <div class="title">Camera unavailable</div>
                <div class="helper">${error}. Try "Type UPC" above.</div>
              </${Fragment}>`
            : html`<${Fragment}>
                <div class="title">Aim at a barcode</div>
                <div class="helper">Hold steady — we'll do the rest.</div>
              </${Fragment}>`}
        </div>

        ${showManual && html`<div class="modal-backdrop" onClick=${() => setShowManual(false)}>
          <div class="modal" onClick=${(e) => e.stopPropagation()}>
            <h2>Type UPC</h2>
            <div class="body">Enter the numbers under the barcode.</div>
            <input type="number" inputmode="numeric" placeholder="e.g. 0123456789012" value=${manual} onInput=${(e) => setManual(e.target.value)} autofocus/>
            <div class="modal-actions">
              <button class="cancel" onClick=${() => setShowManual(false)}>Cancel</button>
              <button class="confirm" onClick=${() => { if (manual) onResult(manual); }}>Look up</button>
            </div>
          </div>
        </div>`}
      </div>`;
    }

    /* ─────────────────────────────────────────────────────────────────
       ROAD HOUSE celebration
       ───────────────────────────────────────────────────────────────── */
    function RoadHouseCelebration({ food }) {
      return html`<div class="roadhouse">
        <div class="stamp">APPROVED</div>
        <div class="title">YEAH BUDDY!</div>
        <div class="sub">● ● ●  ROAD HOUSE  ● ● ●</div>
        ${food && html`<div style="margin-top: 18px; font-size: 13px; color: var(--text-mid);">${food.name}</div>`}
      </div>`;
    }

    /* ─────────────────────────────────────────────────────────────────
       BOOT
       ───────────────────────────────────────────────────────────────── */
    render(h(App), document.getElementById('root'));

    // Service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
